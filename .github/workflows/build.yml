name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: List files (debug)
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          dir
        else
          ls -la
        fi
      shell: bash
    
    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller build.spec
    
    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: pyinstaller build.spec
    
    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller build.spec
    
    - name: List dist directory (debug)
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          dir dist
        else
          ls -la dist/
        fi
      shell: bash
    
    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: bulk-processor-windows
        path: dist/bulk_processor.exe
        if-no-files-found: error
    
    - name: Upload artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: bulk-processor-macos
        path: dist/bulk_processor.app
        if-no-files-found: error
    
    - name: Upload artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: bulk-processor-linux
        path: dist/bulk_processor
        if-no-files-found: error
    
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: bulk-processor-windows
        path: ./windows
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: bulk-processor-macos
        path: ./macos
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: bulk-processor-linux
        path: ./linux
    
    - name: List downloaded artifacts
      run: ls -la
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          windows/bulk_processor.exe
          macos/bulk_processor.app
          linux/bulk_processor
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
