name: 打包工具箱
on:
  push:
    branches: [ main ]

jobs:
  # 打包 Windows EXE
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: 打包EXE
        run: pyinstaller --onefile --noconsole -n bulk_processor src/main.py
      - name: 上传Windows文件
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/bulk_processor.exe

  # 打包 Mac APP
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: 打包Mac
        run: pyinstaller --onefile --noconsole -n bulk_processor src/main.py
      - name: 上传Mac文件
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/bulk_processor.app
